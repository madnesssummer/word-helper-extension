<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>单词助手</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>单词助手</h1>
        <a href="#" id="openOptions">设置</a>
      </header>
      <section>
        <input id="searchInput" type="text" placeholder="输入单词查询" />
        <button id="searchBtn">查询</button>
      </section>
      <section>
        <button id="reviewBtn" class="review-button">开始复习</button>
      </section>
      <section>
        <button id="heatmapBtn" class="heatmap-button">学习热力图</button>
      </section>
      <section>
        <button id="immersiveBtn" class="immersive-button">开启全文翻译</button>
      </section>
      <section class="io-section">
        <button id="exportBtn" class="export-button">导出单词本</button>
        <button id="importBtn" class="import-button">导入单词本</button>
        <input type="file" id="importFile" accept=".json" style="display:none" />
        <div id="ioMsg" class="io-msg" style="display:none"></div>
      </section>
      <section>
        <ul id="wordList"></ul>
      </section>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
